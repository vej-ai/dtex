# detx project config for the engine test suite (docs/06 post-8.B).
#
# tests/fixtures/ is a real detx project: the engine walks up for this file,
# discovers project-local sources/destinations/configs under the *_paths,
# resolves a config by name, and drives source → destination through it.
# The `echo` fixture source lives at sources/echo/, exactly where
# `source_paths: [sources]` looks.
name: detx_test_project
version: "1.0.0"

# Project-local folder roots, relative to this file (docs/06).
source_paths:
  - sources
destination_paths:
  - destinations
config_paths:
  - configs

# Project-wide var overrides (docs/03 §6) — lower precedence than the active
# config's `params:` block, higher than register.yaml param defaults. `echo`
# declares no params, so this is here purely so the config-precedence engine
# tests have a layer to assert.
vars:
  page_size: 100
