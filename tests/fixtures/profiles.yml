# det profiles for the engine test suite (docs/06).
#
# Normally NOT committed — here it is a test fixture, so it carries no real
# secrets. Each target is a named environment selected by run(target=...).
targets:

  dev:
    # Destination credential/routing blocks, keyed by destination connector
    # name (docs/06). The DuckDB destination's `path` defaults to a project-
    # local file; engine tests override it per-test via run(destination_params=).
    destinations:
      duckdb:
        path: ".det/warehouse.duckdb"

    # Named credential blocks resolved by ${profile.<block>.<key>} secret refs
    # in any register.yaml (docs/03 §2.5). The `echo` fixture declares no
    # secrets; this block exists so the secret-resolution engine test has a
    # profile value to resolve against.
    profiles:
      echo:
        sample_token: "dev-profile-token"

  prod:
    destinations:
      duckdb:
        path: ".det/warehouse-prod.duckdb"
    profiles:
      echo:
        sample_token: "prod-profile-token"
