# ShipHero baked source connector — docs/03 §2.8 worked example, expanded.
#
# Ports a hand-written internal ShipHero connector (a `main.py` plus a
# `config.json`) into the dtex contract. The split is the one docs/03 §2.8
# fixes: only the *discovery contract* lives here — GraphQL query strings,
# `field_path` walks, pagination logic, and date-window stepping are Python in
# `source.py` / `client.py` / `queries.py` / `windows.py` / `pagination.py`.
#
# Three streams (shipments, orders, products) — the most commonly synced for
# ecommerce ops. Each is incremental on a server-side `created_date` (or
# equivalent) with a per-window GraphQL cursor pagination strategy and a 2-day
# lookback to catch late-arriving rows.
#
# NOTE: docs/03 §2.8 binds the example to bigquery. We bind to duckdb instead —
# duckdb is the v1 baked default destination (docs/05 §2) and there is no baked
# bigquery destination, so a `bigquery` binding would resolve to nothing on
# `dtex validate`. The binding is portable: a project can override the
# destination by declaring a project-local fork of this connector.
name: shiphero
kind: source
version: "1.0.0"
summary: ShipHero fulfillment data via the public GraphQL API.
tags: [ecommerce, fulfillment, graphql]

# Connector-level strategy knobs — every one of these mirrors a key from the
# v2/main.py reference's `config.json`. Defaults match the reference verbatim
# so a port is behavior-equivalent out of the box.
params:
  api_url:
    type: string
    default: "https://public-api.shiphero.com/graphql"
    description: ShipHero GraphQL endpoint. Overridden in tests to point at a stub server.
  start_date:
    type: string
    default: "2024-01-01"
    description: Fallback initial cursor for streams that omit incremental.initial_value.
  lookback_days:
    type: int
    default: 2
    description: Subtract this many days from the persisted cursor on resume — late-arriving rows.
  step_days:
    type: int
    default: 10
    description: Width of each date-window (dateFrom..dateTo) sent to GraphQL.
  page_size:
    type: int
    default: 50
    description: GraphQL records per page (`first` arg).
  batch_size:
    type: int
    default: 200
    description: Records per yielded dtex batch — drives per-batch destination commits.
  max_retries:
    type: int
    default: 5
    description: HTTP retry attempts on transient (5xx / 429 / timeout) failures.
  retry_backoff_seconds:
    type: float
    default: 2.0
    description: Exponential backoff base — sleep `base * 2**attempt` between retries.

# The one declared secret — the long-lived refresh token. The client exchanges
# it for a short-lived bearer access token via POST /auth/refresh. The two
# resolver forms are locked: only `${env.X}` and `${profile.X.Y}` are accepted
# (docs/03 §2.5). We use the env form by default; a project may fork this
# manifest to switch to `${profile.shiphero.refresh_token}` if it prefers to
# keep secret material in `profiles.yml`.
secrets:
  - name: refresh_token
    ref: ${env.SHIPHERO_REFRESH_TOKEN}

streams:
  # SHIPMENTS — primary fulfillment events, incremental on created_date.
  # The full schema is declared (production-safe; docs/03 §2.2.1's recommended
  # default). Nested arrays (`shipping_labels`, `line_items`) land as `JSON`
  # columns — the docs/04 nested-data approach, exactly as the reference
  # `config.json` does.
  - name: shipments
    table: shipments
    primary_key: id
    write_disposition: merge
    partition_by: created_date
    incremental:
      cursor_field: created_date
      cursor_type: timestamp
      lookback: 2d
      initial_value: "2024-01-01"
    schema:
      - {name: id,                  type: STRING,    mode: REQUIRED}
      - {name: legacy_id,           type: INTEGER}
      - {name: order_id,            type: STRING}
      - {name: user_id,             type: STRING}
      - {name: warehouse_id,        type: STRING}
      - {name: pending_shipment_id, type: STRING}
      - {name: shipped_off_shiphero,type: BOOLEAN}
      - {name: dropshipment,        type: BOOLEAN}
      - {name: created_date,        type: TIMESTAMP}
      - {name: shipping_labels,     type: JSON}
      - {name: line_items,          type: JSON}

  # ORDERS — customer orders, incremental on order_date. Nested `line_items`
  # again as a JSON column.
  - name: orders
    table: orders
    primary_key: id
    write_disposition: merge
    partition_by: order_date
    incremental:
      cursor_field: order_date
      cursor_type: timestamp
      lookback: 2d
      initial_value: "2024-01-01"
    schema:
      - {name: id,             type: STRING,    mode: REQUIRED}
      - {name: legacy_id,      type: INTEGER}
      - {name: order_number,   type: STRING}
      - {name: shop_name,      type: STRING}
      - {name: fulfillment_status, type: STRING}
      - {name: order_date,     type: TIMESTAMP}
      - {name: total_price,    type: FLOAT}
      - {name: subtotal,       type: FLOAT}
      - {name: total_tax,      type: FLOAT}
      - {name: email,          type: STRING}
      - {name: profile,        type: STRING}
      - {name: line_items,     type: JSON}

  # PRODUCTS — catalog records. ShipHero exposes a `products` query with
  # cursor pagination but no built-in date-window arg; we still drive it through
  # the same windowed loop on `updated_at` (the cursor field below is the one
  # the API returns on each node).
  - name: products
    table: products
    primary_key: id
    write_disposition: merge
    incremental:
      cursor_field: updated_at
      cursor_type: timestamp
      lookback: 2d
      initial_value: "2024-01-01"
    schema:
      - {name: id,           type: STRING,    mode: REQUIRED}
      - {name: legacy_id,    type: INTEGER}
      - {name: sku,          type: STRING}
      - {name: name,         type: STRING}
      - {name: barcode,      type: STRING}
      - {name: price,        type: FLOAT}
      - {name: value,        type: FLOAT}
      - {name: created_at,   type: TIMESTAMP}
      - {name: updated_at,   type: TIMESTAMP}
      - {name: kit,          type: BOOLEAN}
      - {name: kit_build,    type: BOOLEAN}
      - {name: warehouse_products, type: JSON}

# As of build stage 8.B, the source's register.yaml no longer carries a
# `destination:` block. A config (configs/<name>.yml) binds this source to
# a destination + target (docs/12).

# Advisory schedule — surfaced to whatever orchestrator runs dtex; the
# engine itself does not act on it (docs/03 §2.6).
schedule: "0 */6 * * *"
