name: Publish to PyPI

# Triggered by pushing a version tag (e.g. `v0.1.0`, `v0.1.0rc1`, `v1.2.3`).
# Builds the sdist + wheel with hatchling, sanity-checks them with twine,
# then publishes via PyPI Trusted Publishing (OIDC) — no API token stored
# in GitHub secrets.
#
# Prerequisites (one-time, see docs/_internal/release.md):
#   1. Register a Trusted Publisher on PyPI for project `detx` pointing at
#      this repository, workflow filename `publish.yml`, environment `pypi`.
#   2. Create a GitHub Environment named `pypi` in repo Settings.
#
# NOTE: a test.pypi.org dry-run path (e.g. trigger on tags like `v*-test`)
# was considered for v0.1 and skipped — adds complexity without value before
# the first real release. Worth adding in a future stage if releases get
# more nuanced.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read
  id-token: write  # REQUIRED for PyPI Trusted Publishing (OIDC).

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    # Bind to the `pypi` GitHub Environment. PyPI's Trusted Publisher
    # config references this name; mismatched names cause OIDC to be
    # rejected by PyPI at upload time.
    environment:
      name: pypi
      url: https://pypi.org/project/detx/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify the distribution
        # Catches malformed README, missing classifiers, etc. BEFORE upload.
        # PyPI doesn't permit re-uploading a deleted version — fail loud
        # locally, not silently after publish.
        run: twine check dist/*

      - name: Publish to PyPI
        # Official PyPA action — Trusted Publishing model. No `password:`
        # or `repository-url:` input: the action auto-uses the OIDC token
        # exposed by `permissions: id-token: write`.
        uses: pypa/gh-action-pypi-publish@release/v1
