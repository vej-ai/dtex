# BigQuery destination — the det production warehouse — docs/05 §2.
#
# A destination connector is a folder with the same manifest format as a
# source (docs/05 §1): kind: destination, no `streams`, no `destination`
# binding. Routing/credential knobs are declared as `params`; secrets are
# resolved through `credentials_path` or Application Default Credentials,
# so this manifest declares NO `secrets:` block.
name: bigquery
kind: destination
version: "1.0.0"
summary: Load data into BigQuery via GCS-staged Parquet + LOAD jobs (Tier A).
tags: [warehouse, bigquery, gcs, tier-a]

params:
  # The GCP project the destination tables live in. Required — there is no
  # sensible default (ADC's project may differ from the intended target).
  project:
    type: string
    required: true
    description: GCP project to load into.
  # The BigQuery dataset (created lazily on first use, in `location`).
  dataset:
    type: string
    required: true
    description: BigQuery dataset name (created lazily).
  # Dataset location — set at create time, immutable after. Multi-region
  # "US"/"EU" or a single-region code (e.g. "us-central1").
  location:
    type: string
    default: "US"
    description: Dataset location (US / EU / single-region code).
  # The user-owned GCS bucket where one-batch Parquet files are staged.
  # det never creates buckets — an operator's concern (region, retention,
  # lifecycle rules).
  staging_bucket:
    type: string
    required: true
    description: GCS bucket for Parquet staging (must exist, your bucket).
  # Object prefix inside the bucket; one prefix per run is derived from it.
  staging_prefix:
    type: string
    default: "det/staging"
    description: GCS object prefix under the bucket.
  # Optional service-account JSON path. Empty string = use Application
  # Default Credentials (GOOGLE_APPLICATION_CREDENTIALS env or gcloud).
  credentials_path:
    type: string
    default: ""
    description: Optional service-account JSON path. Empty = use ADC.
  # Per-job wall-clock timeout (seconds) on the LOAD / MERGE jobs.
  job_timeout_seconds:
    type: int
    default: 300
    description: Wall-clock timeout in seconds for each BigQuery job.
  # Retry policy for transient BigQuery failures (5xx / rate-limit).
  retry_max_attempts:
    type: int
    default: 5
    description: Maximum total attempts per BigQuery job on transient errors.
  retry_backoff_seconds:
    type: float
    default: 1.0
    description: Base seconds for exponential backoff between retries.
